<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center font-body-md">
<div class="w-full max-w-[440px] px-gutter">
<!-- Main Card -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-[32px] sm:p-[40px] flex flex-col gap-stack-gap">
<!-- Brand / Header -->
<div class="flex flex-col items-center gap-2 mb-2">
<div class="h-12 w-12 bg-primary-container rounded-lg flex items-center justify-center mb-2">
<span class="material-symbols-outlined text-on-primary-container" data-icon="local_shipping" style="font-variation-settings: 'FILL' 1; font-size: 28px;">local_shipping</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-primary text-center">Transporte Consolidado</h1>
<p class="font-body-md text-body-md text-on-surface-variant text-center mt-1">Sistema de Gestión de Transporte</p>
</div>
<!-- Form -->
<form class="flex flex-col gap-4">
<!-- Email Field -->
<div class="flex flex-col gap-base-unit">
<label class="font-label-bold text-label-bold text-on-surface" for="email">Correo Electrónico</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]" data-icon="mail">mail</span>
</div>
<input class="w-full pl-10 pr-4 py-2 bg-surface-container-lowest border border-outline-variant rounded focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors font-body-md text-body-md text-on-surface" id="email" name="email" placeholder="usuario@empresa.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-base-unit">
<label class="font-label-bold text-label-bold text-on-surface" for="password">Contraseña</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]" data-icon="lock">lock</span>
</div>
<input class="w-full pl-10 pr-4 py-2 bg-surface-container-lowest border border-outline-variant rounded focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors font-body-md text-body-md text-on-surface" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center mt-2 mb-4">
<input class="h-4 w-4 text-primary focus:ring-primary border-outline-variant rounded bg-surface-container-lowest" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block font-body-md text-body-md text-on-surface-variant" for="remember-me">
                            Recuérdame
                        </label>
</div>
<!-- Submit Button -->
<button class="w-full flex justify-center items-center py-[10px] px-4 border border-transparent rounded bg-primary hover:bg-primary-container text-on-primary font-label-bold text-label-bold transition-colors duration-200" type="submit">
                    Iniciar Sesión
                </button>
</form>
<!-- Footer Meta -->
<div class="mt-4 pt-4 border-t border-outline-variant/50 text-center">
<p class="font-label-caps text-label-caps text-on-surface-variant">TRANSPORTE CONSOLIDADO SECURE PORTAL V0.1</p>
</div>
</div>
</div>
<script>
document.querySelector('form').addEventListener('submit', function(e) {
    e.preventDefault();
    var email = document.getElementById('email').value;
    var password = document.getElementById('password').value;
    if (email && password) {
        localStorage.setItem('isAuth', 'true');
        window.location.href = 'cargas.html';
    } else {
        alert('Por favor ingresa tu correo y contraseña');
    }
});
</script>
</body></html>
